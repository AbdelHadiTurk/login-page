    <body>
        <canvas id="space"></canvas>
        <script src="script.js"></script>
           <form action="" method="GET" onsubmit="return validateAge()">
                <div class="log">
                    <h1>Login now</h1>
                    
                    <Label>Username</Label>
                    <input type="Username" required placeholder="Username" autofocus name="user">
                    <br>
                    <Label>Email</label>
                    <input type="email" required placeholder="example@gmail.com" name="mail" > 
                    <br>
                    <label>Password</label>
                    <input type="password" required placeholder="password" name="pass" minlength="8">
                    <br>
                    <label for="dob">Date of birth</label>
                    <input type="date" id="dob" name="age" required>
                    <br>
                
                </div>

                </div>
            
            </form>
